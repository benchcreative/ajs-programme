<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AJ's Programme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700;1,800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #F3C716;
    --accent-dark: #c9a410;
    --black: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.5);
    --text-dim: rgba(255,255,255,0.25);
    --radius: 10px;
    --radius-lg: 14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}

  /* SPLASH */
  .splash{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.4s ease}
  .splash.hidden{opacity:0;pointer-events:none}
  .splash-logo{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:800;font-style:italic;letter-spacing:-2px;line-height:1;text-align:center}
  .splash-logo span{color:var(--accent)}
  .splash-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.25em;color:var(--text-muted);text-transform:uppercase;margin-top:8px}
  .splash-bar{width:120px;height:2px;background:var(--surface3);margin-top:40px;border-radius:2px;overflow:hidden}
  .splash-bar-fill{height:100%;background:var(--accent);width:0%;animation:load 1.2s ease forwards}
  @keyframes load{to{width:100%}}

  /* APP */
  .app{display:none;flex-direction:column;min-height:100vh;padding-bottom:80px}
  .app.visible{display:flex}

  /* HEADER */
  .header{background:var(--black);padding:16px 16px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .logo{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;font-style:italic;letter-spacing:-0.5px;line-height:1}
  .logo span{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:12px}
  .header-stats{display:flex;gap:12px}
  .header-stat{text-align:right}
  .header-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent);line-height:1}
  .header-stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}
  .settings-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border-strong);background:none;color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .settings-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* TABS */
  .day-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:0;scrollbar-width:none;margin:0 -16px;padding:0 16px 0}
  .day-tabs::-webkit-scrollbar{display:none}
  .day-tab{flex-shrink:0;padding:10px 16px 12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);background:none;border:none;cursor:pointer;position:relative;transition:color 0.15s}
  .day-tab::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:transparent;transition:background 0.15s}
  .day-tab.active{color:var(--accent)}
  .day-tab.active::after{background:var(--accent)}
  .day-tab.done{color:rgba(255,255,255,0.35)}
  .day-tab.done::after{background:rgba(255,255,255,0.15)}

  /* SESSION */
  .session-header{padding:20px 16px 12px;display:flex;align-items:flex-end;justify-content:space-between}
  .session-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;font-style:italic;text-transform:uppercase;line-height:1}
  .session-title span{color:var(--accent)}
  .session-meta{font-size:12px;color:var(--text-muted);text-align:right;padding-bottom:4px}
  .progress-strip{margin:0 16px 16px;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width 0.4s ease;border-radius:2px}

  /* EXERCISE CARDS */
  .exercise-card{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.2s}
  .exercise-card.complete{border-color:rgba(243,199,22,0.3)}
  .exercise-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .exercise-header:active{background:var(--surface2)}
  .ex-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;line-height:1.1}
  .ex-type{font-size:11px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}
  .ex-right{display:flex;align-items:center;gap:8px}
  .badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
  .badge-done{background:rgba(243,199,22,0.15);color:var(--accent)}
  .badge-progress{background:rgba(100,220,100,0.12);color:#7ddc7d}
  .badge-sets{background:var(--surface3);color:var(--text-muted)}
  .chevron{color:var(--text-dim);font-size:10px;transition:transform 0.2s;margin-left:4px}
  .chevron.open{transform:rotate(90deg);color:var(--accent)}
  .exercise-body{display:none;border-top:1px solid var(--border);padding:14px 16px}
  .exercise-body.open{display:block}
  .sets-header{display:grid;grid-template-columns:56px 1fr 1fr 36px 24px;gap:8px;margin-bottom:10px}
  .sets-header span{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em}
  .set-row{display:grid;grid-template-columns:56px 1fr 1fr 36px 24px;gap:8px;align-items:center;margin-bottom:8px}
  .set-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em}
  .set-label.warmup{color:rgba(243,199,22,0.5)}
  .set-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;font-size:15px;font-weight:600;font-family:'Barlow Condensed',sans-serif;color:var(--text);text-align:center;width:100%;transition:border-color 0.15s;-moz-appearance:textfield}
  .set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .set-input:focus{outline:none;border-color:var(--accent);background:var(--surface3)}
  .set-input.filled{border-color:rgba(255,255,255,0.2)}
  .set-check{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border-strong);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s;margin:0 auto}
  .set-check.checked{background:var(--accent);border-color:var(--accent);color:var(--black)}
  .add-set-btn{width:100%;margin-top:8px;padding:8px;background:none;border:1px dashed var(--border-strong);border-radius:8px;color:var(--text-muted);font-size:12px;font-weight:600;font-family:'Barlow',sans-serif;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.06em}
  .add-set-btn:hover{border-color:var(--accent);color:var(--accent)}
  .last-session{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
  .last-session-label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
  .last-session-sets{display:flex;flex-wrap:wrap;gap:6px}
  .last-set-pill{background:var(--surface3);border-radius:6px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted)}
  .progress-hint{margin-top:10px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#7ddc7d;text-transform:uppercase;letter-spacing:0.06em}
  .progress-hint::before{content:'▲';font-size:9px}
  .section-divider{margin:4px 16px 12px;display:flex;align-items:center;gap:10px}
  .section-divider-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em;white-space:nowrap}
  .section-divider-line{flex:1;height:1px;background:var(--border)}

  /* BOTTOM BAR */
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:var(--black);border-top:1px solid var(--border);display:flex;gap:10px;z-index:100}
  .btn{flex:1;padding:14px;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;border:none}
  .btn:active{transform:scale(0.97)}
  .btn-outline{background:none;border:1px solid var(--border-strong);color:var(--text-muted);flex:0.6}
  .btn-primary{background:var(--accent);color:var(--black);flex:1.4}

  /* OVERLAYS */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;flex-direction:column}
  .overlay.open{display:flex}
  .overlay-header{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
  .overlay-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;font-style:italic;text-transform:uppercase}
  .overlay-title span{color:var(--accent)}
  .overlay-close{background:var(--surface3);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
  .overlay-body{flex:1;overflow-y:auto;padding:16px;background:var(--black)}

  /* HISTORY */
  .history-empty{text-align:center;padding:60px 20px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em}
  .history-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden}
  .history-entry-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .history-date{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
  .history-day-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
  .history-entry-body{padding:12px 14px}
  .history-ex{margin-bottom:10px}
  .history-ex-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;color:var(--text-muted)}
  .history-ex-sets{display:flex;flex-wrap:wrap;gap:5px}
  .history-set-pill{background:var(--surface3);border-radius:6px;padding:3px 9px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--text)}

  /* SETTINGS PANEL */
  .settings-panel{position:fixed;inset:0;background:var(--black);z-index:300;display:none;flex-direction:column;transform:translateX(100%);transition:transform 0.3s ease}
  .settings-panel.open{display:flex;transform:translateX(0)}
  .settings-header{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
  .settings-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;font-style:italic;text-transform:uppercase}
  .settings-title span{color:var(--accent)}
  .settings-body{flex:1;overflow-y:auto;padding:16px}
  .settings-section{margin-bottom:28px}
  .settings-section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .settings-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .settings-label{font-size:13px;color:var(--text-muted)}
  .settings-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:'Barlow',sans-serif;color:var(--text);flex:1;margin-left:12px}
  .settings-input:focus{outline:none;border-color:var(--accent)}

  /* COLOUR PICKER */
  .colour-options{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .colour-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;position:relative}
  .colour-swatch.active{border-color:var(--text)}
  .colour-swatch.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--black)}

  /* EXERCISE LIBRARY */
  .library-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:4px}
  .library-tabs::-webkit-scrollbar{display:none}
  .lib-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);background:none;cursor:pointer;transition:all 0.15s}
  .lib-tab.active{background:var(--accent);color:var(--black);border-color:var(--accent)}
  .lib-exercise{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)}
  .lib-ex-info{}
  .lib-ex-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
  .lib-ex-type{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em}
  .lib-add-btn{background:none;border:1px solid var(--border-strong);border-radius:8px;padding:6px 12px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap}
  .lib-add-btn:hover{border-color:var(--accent);color:var(--accent)}
  .lib-add-btn.added{background:rgba(243,199,22,0.1);border-color:var(--accent);color:var(--accent)}
  .day-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:'Barlow',sans-serif;color:var(--text);margin-bottom:10px;width:100%}
  .day-select:focus{outline:none;border-color:var(--accent)}

  /* CURRENT EXERCISES IN SETTINGS */
  .day-ex-list{margin-bottom:16px}
  .day-ex-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
  .day-ex-name{font-size:13px;color:var(--text)}
  .day-ex-remove{background:none;border:none;color:rgba(255,80,80,0.5);cursor:pointer;font-size:16px;padding:0 4px;transition:color 0.15s}
  .day-ex-remove:hover{color:rgba(255,80,80,1)}

  /* TOAST */
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--black);padding:10px 20px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:9999;white-space:nowrap}
  .toast.show{opacity:1}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-logo" id="splash-name">AJ'S<br><span>PROGRAMME</span></div>
  <div class="splash-sub">Upper body · 3+1 split</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo" id="header-logo">AJ'S <span>PROGRAMME</span></div>
      <div class="header-right">
        <div class="header-stats">
          <div class="header-stat">
            <div class="header-stat-val" id="hdr-week">1</div>
            <div class="header-stat-label">Week</div>
          </div>
          <div class="header-stat">
            <div class="header-stat-val" id="hdr-sessions">0</div>
            <div class="header-stat-label">Sessions</div>
          </div>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
      </div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
  </div>

  <div class="session-header">
    <div><div class="session-title" id="session-title"></div></div>
    <div class="session-meta" id="session-meta"></div>
  </div>

  <div class="progress-strip">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div id="exercises-container"></div>

  <button onclick="openHistory()" style="margin:4px 16px 16px;width:calc(100% - 32px);padding:12px;background:none;border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">
    View progress history
  </button>
</div>

<div class="bottom-bar">
  <button class="btn btn-outline" onclick="clearSession()">Clear</button>
  <button class="btn btn-primary" onclick="saveSession()">Save session</button>
</div>

<!-- HISTORY OVERLAY -->
<div class="overlay" id="history-overlay">
  <div class="overlay-header">
    <div class="overlay-title">Progress <span>History</span></div>
    <button class="overlay-close" onclick="closeHistory()">✕</button>
  </div>
  <div class="overlay-body" id="history-body"></div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-header">
    <div class="settings-title">Settings <span>&</span> Library</div>
    <button class="overlay-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-body">

    <!-- PERSONAL -->
    <div class="settings-section">
      <div class="settings-section-title">Personal</div>
      <div class="settings-row">
        <span class="settings-label">Your name</span>
        <input class="settings-input" id="setting-name" type="text" placeholder="e.g. AJ" oninput="applyName(this.value)" />
      </div>
      <div style="margin-top:4px">
        <div class="settings-label" style="margin-bottom:10px">Accent colour</div>
        <div class="colour-options" id="colour-options"></div>
      </div>
    </div>

    <!-- MANAGE EXERCISES -->
    <div class="settings-section">
      <div class="settings-section-title">Manage Programme</div>
      <div class="settings-label" style="margin-bottom:8px;font-size:12px">Select a day to view and remove exercises</div>
      <select class="day-select" id="manage-day-select" onchange="renderManageDay()"></select>
      <div class="day-ex-list" id="manage-day-list"></div>
    </div>

    <!-- EXERCISE LIBRARY -->
    <div class="settings-section">
      <div class="settings-section-title">Add Exercises</div>
      <div class="settings-label" style="margin-bottom:8px;font-size:12px">Add to day:</div>
      <select class="day-select" id="lib-day-select"></select>
      <div class="library-tabs" id="lib-tabs"></div>
      <div id="lib-exercises"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── EXERCISE LIBRARY ───────────────────────────────────────────────
const LIBRARY = {
  'Chest': [
    {id:'lib_bench',name:'Barbell bench press',type:'Compound · Chest'},
    {id:'lib_incline_bb',name:'Incline barbell press',type:'Compound · Chest'},
    {id:'lib_incline_db',name:'Incline dumbbell press',type:'Hypertrophy · Chest'},
    {id:'lib_decline_db',name:'Decline dumbbell press',type:'Hypertrophy · Chest'},
    {id:'lib_smith_inc',name:'Smith machine incline',type:'Compound · Chest'},
    {id:'lib_machine_chest',name:'Machine chest press',type:'Isolation · Chest'},
    {id:'lib_pec_deck',name:'Pec deck / machine fly',type:'Isolation · Chest'},
    {id:'lib_cable_fly',name:'Cable fly (mid)',type:'Isolation · Chest'},
    {id:'lib_high_low',name:'High to low cable',type:'Isolation · Chest'},
    {id:'lib_low_high',name:'Low to high cable',type:'Isolation · Chest'},
    {id:'lib_dips',name:'Chest dips',type:'Compound · Chest'},
    {id:'lib_pushup',name:'Push-ups',type:'Bodyweight · Chest'},
  ],
  'Back': [
    {id:'lib_deadlift',name:'Deadlift',type:'Compound · Back'},
    {id:'lib_tbar',name:'T-bar row',type:'Compound · Back'},
    {id:'lib_bb_row',name:'Barbell row',type:'Compound · Back'},
    {id:'lib_seated_row_v',name:'Seated row (V bar)',type:'Compound · Back'},
    {id:'lib_seated_row_wide',name:'Seated row (wide grip)',type:'Compound · Back'},
    {id:'lib_lat_vbar',name:'Lat pulldown (V bar)',type:'Compound · Back'},
    {id:'lib_lat_wide',name:'Lat pulldown (wide grip)',type:'Compound · Back'},
    {id:'lib_lat_single',name:'Lat pulldown (single arm)',type:'Unilateral · Back'},
    {id:'lib_lat_straight',name:'Straight arm pulldown',type:'Isolation · Back'},
    {id:'lib_pullup',name:'Pull-ups',type:'Bodyweight · Back'},

// ─── PERSISTENCE ────────────────────────────────────────────────────
function load() {
  try {
    const s = localStorage.getItem('ajs_session'); if(s) session = JSON.parse(s);
    const h = localStorage.getItem('ajs_history'); if(h) history = JSON.parse(h);
    const d = localStorage.getItem('ajs_day'); if(d!==null) currentDay = parseInt(d);
    const e = localStorage.getItem('ajs_exercises'); if(e) { const ex = JSON.parse(e); DAYS.forEach(day=>{ if(ex[day.id]) day.exercises=ex[day.id]; }); }
    const st = localStorage.getItem('ajs_settings'); if(st) settings = {...settings,...JSON.parse(st)};
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem('ajs_session', JSON.stringify(session));
    localStorage.setItem('ajs_history', JSON.stringify(history));
    localStorage.setItem('ajs_day', currentDay.toString());
    const ex = {}; DAYS.forEach(day=>{ ex[day.id]=day.exercises; });
    localStorage.setItem('ajs_exercises', JSON.stringify(ex));
    localStorage.setItem('ajs_settings', JSON.stringify(settings));
  } catch(e) {}
}

// ─── SETTINGS ───────────────────────────────────────────────────────
function openSettings() {
  const panel = document.getElementById('settings-panel');
  panel.style.display = 'flex';
  setTimeout(()=>panel.style.transform='translateX(0)',10);

  document.getElementById('setting-name').value = settings.name;
  renderColours();
  renderManageDaySelect();
  renderManageDay();
  renderLibDaySelect();
  renderLibTabs();
  renderLibExercises();
}

function closeSettings() {
  const panel = document.getElementById('settings-panel');
  panel.style.transform = 'translateX(100%)';
  setTimeout(()=>panel.style.display='none', 300);
}

function applyName(val) {
  settings.name = val || 'My';
  applySettings();
}

function applySettings() {
  // Update accent colour
  document.documentElement.style.setProperty('--accent', settings.colour);
  document.documentElement.style.setProperty('--accent-dark', shadeColour(settings.colour, -20));
  // Update logo
  const n = settings.name.toUpperCase();
  document.getElementById('header-logo').innerHTML = `${n}'S <span>PROGRAMME</span>`;
  document.getElementById('splash-name').innerHTML = `${n}'S<br><span>PROGRAMME</span>`;
  save();
}

function shadeColour(col, pct) {
  const num = parseInt(col.slice(1),16);
  const r = Math.min(255,Math.max(0,(num>>16)+pct));
  const g = Math.min(255,Math.max(0,((num>>8)&0xff)+pct));
  const b = Math.min(255,Math.max(0,(num&0xff)+pct));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}

function renderColours() {
  const c = document.getElementById('colour-options');
  c.innerHTML = COLOURS.map(col=>`
    <div class="colour-swatch ${settings.colour===col.val?'active':''}"
      style="background:${col.val}"
      onclick="selectColour('${col.val}')"></div>
  `).join('');
}

  renderColours();
}

  }).join('');

function addLibExercise(exId, dayIdxStr) {
  const dayIdx = parseInt(dayIdxStr);
  const day = DAYS[dayIdx];
  // Find in library
  let found = null;
  for(const cat of Object.values(LIBRARY)){ const ex=cat.find(e=>e.id===exId); if(ex){found=ex;break;} }
  if(!found) return;
  if(day.exercises.find(e=>e.id===exId)){ showToast('Already on this day'); return; }
  const isCardio = found.type.includes('Cardio');
  const newEx = {
    id: exId + '_' + Date.now(),
    name: found.name,
    type: found.type,
    sets: isCardio
      ? [{t:'Cardio'},{t:'Cardio'},{t:'Cardio'}]
      : [{t:'Warm up'},{t:'Working'},{t:'Working'},{t:'Working'}]
  };
  day.exercises.push(newEx);
  save();
  renderLibExercises();
  renderManageDay();
  renderSession();
  showToast(`Added to ${day.name}`);
}

// ─── CORE TRACKER ───────────────────────────────────────────────────
function key(dayId,exId,si,f){return`${dayId}_${exId}_${si}_${f}`}

function getLastForEx(exId){
  for(let i=history.length-1;i>=0;i--){ if(history[i].ex&&history[i].ex[exId]) return history[i].ex[exId]; }
  return null;
}

function getWeek(){
  if(!history.length) return 1;
  return Math.floor((new Date()-new Date(history[0].date))/(7*24*60*60*1000))+1;
}

function getProgress(){
  const day=DAYS[currentDay]; let total=0,done=0;
  day.exercises.forEach(ex=>ex.sets.forEach((_,si)=>{ total++; if(session[key(day.id,ex.id,si,'done')]) done++; }));
  return total?Math.round((done/total)*100):0;
}

function checkReadyToProgress(exId,dayId,sets){
  const last=getLastForEx(exId); if(!last||!last.sets) return false;
  const working=sets.filter(s=>s.t==='Working'); if(working.length<2) return false;
  const allHit10=working.every((s,si)=>parseInt(session[key(dayId,exId,sets.indexOf(s),'r')]||0)>=10);
  const allDone=working.every((s,si)=>session[key(dayId,exId,sets.indexOf(s),'done')]);
  return allHit10&&allDone;
}

function renderTabs(){
  document.getElementById('day-tabs').innerHTML=DAYS.map((d,i)=>{
    const done=history.some(h=>h.dayId===d.id);
    return`<button class="day-tab ${i===currentDay?'active':done?'done':''}" onclick="switchDay(${i})">${d.name}</button>`;
  }).join('');
}

function renderHeader(){
  document.getElementById('hdr-week').textContent=getWeek();
  document.getElementById('hdr-sessions').textContent=history.length;
}

function renderSession(){
  const day=DAYS[currentDay];
  document.getElementById('session-title').innerHTML=`${day.label} <span>${day.label2}</span>`;
  document.getElementById('session-meta').textContent=`${day.exercises.length} exercises`;
  document.getElementById('progress-fill').style.width=getProgress()+'%';
  const c=document.getElementById('exercises-container');
  const groups={};
  day.exercises.forEach(ex=>{ const g=ex.type.split(' · ')[1]||'Other'; if(!groups[g]) groups[g]=[]; groups[g].push(ex); });
  let html='';
  Object.entries(groups).forEach(([group,exs])=>{
    html+=`<div class="section-divider"><span class="section-divider-label">${group}</span><div class="section-divider-line"></div></div>`;
    exs.forEach(ex=>{
      const isOpen=session[`open_${day.id}_${ex.id}`]||false;
      const last=getLastForEx(ex.id);
      const ready=checkReadyToProgress(ex.id,day.id,ex.sets);
      const doneSets=ex.sets.filter((_,si)=>session[key(day.id,ex.id,si,'done')]).length;
      const allDone=doneSets===ex.sets.length;
      const isCardio=ex.type.includes('Cardio');
      let setsHtml=`<div class="sets-header" style="grid-template-columns:56px 1fr 1fr 36px 24px"><span>Set</span><span>${isCardio?'Duration':'Weight (kg)'}</span><span>${isCardio?'Distance/Level':'Reps'}</span><span></span><span></span></div>`;
      ex.sets.forEach((s,si)=>{
        const w=session[key(day.id,ex.id,si,'w')]||'';
        const r=session[key(day.id,ex.id,si,'r')]||'';
        const done=session[key(day.id,ex.id,si,'done')]||false;
        const isWarmup=s.t==='Warm up';
        const canRemove=ex.sets.length>1;
        setsHtml+=`<div class="set-row" style="grid-template-columns:56px 1fr 1fr 36px 24px">
          <span class="set-label ${isWarmup?'warmup':''}">${s.t}</span>
          <input class="set-input ${w?'filled':''}" type="${isCardio?'text':'number'}" inputmode="${isCardio?'text':'decimal'}" placeholder="—" value="${w}" step="2.5"
            onchange="updateKey('${key(day.id,ex.id,si,'w')}',this.value);this.classList.toggle('filled',!!this.value)"
            oninput="updateKey('${key(day.id,ex.id,si,'w')}',this.value);this.classList.toggle('filled',!!this.value)" />
          <input class="set-input ${r?'filled':''}" type="${isCardio?'text':'number'}" inputmode="${isCardio?'text':'numeric'}" placeholder="—" value="${r}"
            onchange="updateKey('${key(day.id,ex.id,si,'r')}',this.value);updateProgress();this.classList.toggle('filled',!!this.value)"
            oninput="updateKey('${key(day.id,ex.id,si,'r')}',this.value);updateProgress();this.classList.toggle('filled',!!this.value)" />
          <div class="set-check ${done?'checked':''}" onclick="toggleDone('${day.id}','${ex.id}',${si})">${done?'✓':''}</div>
          <div onclick="${canRemove?`removeSet('${day.id}','${ex.id}',${si})`:''}" style="color:${canRemove?'rgba(255,255,255,0.2)':'transparent'};cursor:${canRemove?'pointer':'default'};font-size:16px;text-align:center;line-height:32px;transition:color 0.15s" onmouseover="this.style.color='${canRemove?'#ff5555':'transparent'}'" onmouseout="this.style.color='${canRemove?'rgba(255,255,255,0.2)':'transparent'}'">✕</div>
        </div>`;
      });
      setsHtml+=`<button class="add-set-btn" onclick="addSet('${day.id}','${ex.id}')">+ Add set</button>`;
      if(last&&last.sets&&last.sets.length){
        const pills=last.sets.filter(s=>s.w&&s.r).map(s=>`<div class="last-set-pill">${s.w} × ${s.r}</div>`).join('');
        if(pills) setsHtml+=`<div class="last-session"><div class="last-session-label">Last session</div><div class="last-session-sets">${pills}</div></div>`;
      }
      if(ready) setsHtml+=`<div class="progress-hint">Ready to increase weight next session</div>`;
      html+=`<div class="exercise-card ${allDone?'complete':''}">
        <div class="exercise-header" onclick="toggleEx('${day.id}','${ex.id}')">
          <div><div class="ex-name">${ex.name}</div><div class="ex-type">${ex.type}</div></div>
          <div class="ex-right">
            ${ready?'<span class="badge badge-progress">Progress</span>':''}
            ${allDone?'<span class="badge badge-done">Done</span>':`<span class="badge badge-sets">${doneSets}/${ex.sets.length}</span>`}
            <span class="chevron ${isOpen?'open':''}">▶</span>
          </div>
        </div>
        <div class="exercise-body ${isOpen?'open':''}">${setsHtml}</div>
      </div>`;
    });
  });
  c.innerHTML=html;
}

function updateKey(k,v){session[k]=v;save()}
function toggleDone(dayId,exId,si){const k=key(dayId,exId,si,'done');session[k]=!session[k];save();renderSession()}
function toggleEx(dayId,exId){session[`open_${dayId}_${exId}`]=!session[`open_${dayId}_${exId}`];renderSession()}
function updateProgress(){document.getElementById('progress-fill').style.width=getProgress()+'%'}

function addSet(dayId,exId){
  const day=DAYS.find(d=>d.id===dayId);
  const ex=day.exercises.find(e=>e.id===exId);
  const isCardio=ex.type.includes('Cardio');
  ex.sets.push({t:isCardio?'Cardio':'Working'});
  save();renderSession();
}

function removeSet(dayId,exId,si){
  const day=DAYS.find(d=>d.id===dayId);
  const ex=day.exercises.find(e=>e.id===exId);
  if(ex.sets.length<=1) return;
  ex.sets.splice(si,1);
  ['w','r','done'].forEach(f=>delete session[dayId+'_'+exId+'_'+si+'_'+f]);
  save();renderSession();
}

function switchDay(i){currentDay=i;save();renderTabs();renderSession()}

function clearSession(){
  const day=DAYS[currentDay];
  Object.keys(session).filter(k=>k.startsWith(day.id+'_')).forEach(k=>delete session[k]);
  save();renderSession();showToast('Session cleared');
}

function saveSession(){
  const day=DAYS[currentDay];
  const ex={};
  day.exercises.forEach(e=>{
    const sets=e.sets.map((s,si)=>({t:s.t,w:session[key(day.id,e.id,si,'w')]||'',r:session[key(day.id,e.id,si,'r')]||'',done:session[key(day.id,e.id,si,'done')]||false})).filter(s=>s.w||s.r);
    if(sets.length) ex[e.id]={name:e.name,sets};
  });
  history.push({date:new Date().toISOString(),dayId:day.id,dayName:day.name+' — '+day.label+' '+day.label2,ex});
  save();renderTabs();renderHeader();showToast('Session saved ✓');
}

function openHistory(){document.getElementById('history-overlay').classList.add('open');renderHistory()}
function closeHistory(){document.getElementById('history-overlay').classList.remove('open')}

function renderHistory(){
  const body=document.getElementById('history-body');
  if(!history.length){body.innerHTML='<div class="history-empty">No sessions logged yet</div>';return}
  body.innerHTML=[...history].reverse().slice(0,20).map(h=>{
    const dateStr=new Date(h.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    const exHtml=Object.values(h.ex||{}).map(e=>{
      const pills=e.sets.filter(s=>s.w&&s.r).map(s=>`<div class="history-set-pill">${s.w} × ${s.r}</div>`).join('');
      return`<div class="history-ex"><div class="history-ex-name">${e.name}</div><div class="history-ex-sets">${pills}</div></div>`;
    }).join('');
    return`<div class="history-entry"><div class="history-entry-header"><div><div class="history-date">${dateStr}</div><div class="history-day-label">${h.dayName||''}</div></div></div><div class="history-entry-body">${exHtml||'<span style="font-size:12px;color:var(--text-dim)">No data logged</span>'}</div></div>`;
  }).join('');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── INIT ────────────────────────────────────────────────────────────
load();
applySettings();
setTimeout(()=>{
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  renderTabs();renderHeader();renderSession();
},1400);

// Update lib exercises when day changes
document.getElementById('lib-day-select').addEventListener('change',()=>{renderLibExercises();renderManageDay()});
document.getElementById('manage-day-select').addEventListener('change',renderManageDay);
</script>
